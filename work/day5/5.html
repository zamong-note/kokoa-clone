<!DOCTYPE html>
<html lang="en">
<head>
        <link rel="stylesheet" href="5.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day 5</title>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__column">
            <i class="fa-solid fa-x"></i>
        </div>
        <div class="status-bar__column">
            <span>playlist</span>
        </div>
    </div>

    <div class="main-song">
    <div class="main-song__cover">
        <i class="fa-regular fa-image"></i>
    </div>

    <div class="main-song__info">
        <h1>Random Love</h1>
        <p>by Divay Kapoor</p>
    </div>
    </div>
    
    <div class="play-bar">
        <div class="play-bar__play">
            <i class="fa-solid fa-play"></i>
            <span>play</span>
        </div>
        <div class="play-bar__like">
            <i class="fa-regular fa-heart"></i>
        </div>
        <div class="play-bar__plus">
            <i class="fa-solid fa-plus"></i>
        </div>
    </div>

    <ul class="playlist">
    <li>
        <div class="icon orange"></div>
        <div class="text">
            <h3>Matargasti</h3>
            <p>Mohit Chauhan</p>
        </div>
    </li>

    <li>
        <div class="icon pink"></div>
        <div class="text">
            <h3>Attitude</h3>
            <p>Lewis OfMan · Attitude</p>
        </div>
    </li>

    <li>
        <div class="icon blue"></div>
        <div class="text">
            <h3>Try Everthing</h3>
            <p>Shakira · Zootopia</p>
        </div>
    </li>

    <li>
        <div class="icon green"></div>
        <div class="text">
            <h3>Sunflower</h3>
            <p>Joseph Vincent · Sunflower</p>
        </div>
    </li>
</ul>
    <script src="https://kit.fontawesome.com/5882a4dbdb.js" crossorigin="anonymous"></script>

</html>
